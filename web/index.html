<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/style.css">
</head>
<body>
<main>
  <header>
    <h1>{{TITLE}}</h1>
    <div class="active"><span class="num">{{ACTIVE}}</span> active connections</div>
  </header>

  <section class="traffic">
    <div class="card">
      <h3>Today</h3>
      <div class="row"><span>RX</span><b>{{DAILY_DOWN}}</b></div>
      <div class="row"><span>TX</span><b>{{DAILY_UP}}</b></div>
    </div>
    <div class="card">
      <h3>Total</h3>
      <div class="row"><span>RX</span><b>{{TOTAL_DOWN}}</b></div>
      <div class="row"><span>TX</span><b>{{TOTAL_UP}}</b></div>
    </div>
  </section>

  <!-- Shows "since your last visit" when that delta is > 0, otherwise the
       all-time total. The whole sentence is rendered server-side. -->
  <p class="since">{{TRAFFIC_LINE}}</p>

  <!-- Optional box: drop a web/information.html file to fill it (donation
       info, config examples, contacts, ...). Full HTML, edited by hand. -->
  {{INFORMATION}}

  <footer><a href="https://github.com/freeacetone/outproxy-eagle">outproxy-eagle</a> v{{VERSION}}</footer>
</main>
</body>
</html>
