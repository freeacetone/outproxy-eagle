<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- JS-FREE: live values refresh via this meta tag, no scripting at all -->
<meta http-equiv="refresh" content="30">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<main>
  <h1>{{TITLE}}</h1>

  <section class="traffic">
    <div class="card"><h3>Today &uarr;</h3><p>{{DAILY_UP}}</p></div>
    <div class="card"><h3>Today &darr;</h3><p>{{DAILY_DOWN}}</p></div>
    <div class="card"><h3>Total &uarr;</h3><p>{{TOTAL_UP}}</p></div>
    <div class="card"><h3>Total &darr;</h3><p>{{TOTAL_DOWN}}</p></div>
  </section>

  <!-- Optional box: drop a web/information.html file to fill it (donation
       info, config examples, contacts, ...). Full HTML, edited by hand. -->
  {{INFORMATION}}

  <section class="lists">
    <div>
      <h2>Last destinations</h2>
      <ul class="last">{{LAST}}</ul>
    </div>
    <div>
      <h2>Top today</h2>
      <ul class="top">{{TOP_DAILY}}</ul>
    </div>
    <div>
      <h2>Top total</h2>
      <ul class="top">{{TOP_TOTAL}}</ul>
    </div>
  </section>

  <footer>
    {{TITLE}} &middot; outproxy-eagle v{{VERSION}} &middot; {{DATE}} &middot;
    <a href="/stats.json">stats.json</a>
  </footer>
</main>
</body>
</html>
