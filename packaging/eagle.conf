# outproxy-eagle system configuration (installed by the .deb package).
# Edit this file, then: systemctl enable --now outproxy-eagle
# See /usr/share/doc/outproxy-eagle/eagle.conf.example for the full reference.

# ---- Listeners (0.0.0.0 = public IPv4, [::] = public IPv6) ----
socks  0.0.0.0:1080
http   0.0.0.0:3128
# Web UI: keep it local; put nginx + TLS in front for public access.
web    127.0.0.1:8161

# ---- Parent proxies: name  type(socks5|http|direct)  host:port ----
parent tor    socks5  127.0.0.1:9050
parent i2pd   http    127.0.0.1:4444

# ---- Routing rules: first match wins ----
route  *.onion   tor
route  *.i2p     i2pd
route  *         direct

# ---- Logging (OFF by default for privacy; set "on" to enable the access log) ----
set logging   off

# Drop idle tunnels after this many seconds with no traffic (0 = off).
set idletimeout 600

# ---- Paths (managed by the systemd unit's StateDirectory) ----
set webdir    /usr/share/outproxy-eagle/web
set logfile   /var/lib/outproxy-eagle/eagle.log
set statsfile /var/lib/outproxy-eagle/state.json
